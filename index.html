<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life Planner - 인라인 다이어리</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="mobile-mode">
    <!-- 모달 레이어들 -->
    <div id="auth-overlay" class="auth-overlay" style="display: none;">
        <div class="auth-box">
            <button class="close-auth" onclick="closeModal('auth-overlay')">&times;</button>
            <h2 id="auth-title">로그인</h2>
            <form id="auth-form">
                <input type="text" id="username" placeholder="아이디" required>
                <input type="password" id="password" placeholder="비밀번호" required>
                <div id="signup-fields" style="display: none;">
                    <input type="text" id="security-answer" placeholder="보물 1호는?">
                </div>
                <button type="submit" class="primary-btn">로그인</button>
            </form>
            <div class="auth-footer">
                <button id="auth-switch-btn" class="text-link">회원가입 하기</button>
            </div>
        </div>
    </div>

    <!-- 프로필 모달 -->
    <div id="profile-overlay" class="auth-overlay" style="display: none;">
        <div class="auth-box profile-box">
            <h2>설정</h2>
            <div class="profile-section">
                <label>닉네임</label>
                <input type="text" id="display-name">
                <button onclick="updateProfile()" class="small-btn">저장</button>
            </div>
            <div class="couple-section">
                <label>커플 연동</label>
                <input type="text" id="partner-id" placeholder="상대방 아이디">
                <button onclick="linkCouple()" class="small-btn">연동</button>
                <p id="couple-status" class="couple-status"></p>
            </div>
            <button onclick="closeModal('profile-overlay')" class="close-btn">닫기</button>
        </div>
    </div>

    <div class="mobile-container">
        <!-- 상단 헤더 -->
        <header class="mobile-header">
            <div class="header-left">
                <div id="user-welcome" class="user-welcome">방문자님</div>
                <div id="trial-badge" class="trial-badge">체험판</div>
            </div>
            <div class="header-right">
                <button id="login-nav-btn" class="login-nav-btn" onclick="openModal('auth-overlay')">로그인</button>
                <button id="profile-btn" onclick="openModal('profile-overlay')" class="icon-btn" style="display: none;"><i class="fas fa-cog"></i></button>
                <button id="logout-btn" class="icon-btn" style="display: none;"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <!-- 메인 달력 영역 -->
        <main class="content-area">
            <div class="calendar-nav">
                <button id="prev-month"><i class="fas fa-chevron-left"></i></button>
                <h2 id="current-month-year">2024년 3월</h2>
                <button id="next-month"><i class="fas fa-chevron-right"></i></button>
            </div>
            
            <div id="calendar" class="calendar">
                <!-- 달력 날짜와 인라인 상세창이 이곳에 생성됨 -->
            </div>

            <div class="monthly-summary-bar">
                이번 달 총 지출: <span id="total-monthly-expense">0</span>원
            </div>
        </main>
    </div>

    <!-- 인라인 상세 내역 템플릿 (JS에서 복사하여 사용) -->
    <template id="detail-template">
        <div class="inline-detail">
            <div class="detail-header">
                <h3 class="detail-date">3월 1일</h3>
                <button class="close-detail" onclick="closeDetail()">&times;</button>
            </div>
            <div class="detail-grid">
                <div class="detail-card">
                    <h4><i class="fas fa-calendar-check"></i> 일정</h4>
                    <div class="mini-input-group">
                        <input type="text" class="schedule-in" placeholder="할 일 추가">
                        <button class="add-s-btn"><i class="fas fa-plus"></i></button>
                    </div>
                    <ul class="s-list item-list"></ul>
                </div>
                <div class="detail-card">
                    <h4><i class="fas fa-won-sign"></i> 가계부</h4>
                    <div class="mini-input-group">
                        <input type="text" class="exp-desc-in" placeholder="내용">
                        <input type="number" class="exp-amt-in" placeholder="금액">
                        <button class="add-e-btn"><i class="fas fa-plus"></i></button>
                    </div>
                    <ul class="e-list item-list"></ul>
                    <div class="day-total">합계: <span class="d-total-amt">0</span>원</div>
                </div>
            </div>
        </div>
    </template>

    <script src="main.js"></script>
</body>
</html>
