<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life Planner - 인라인 다이어리</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="mobile-mode">
    <!-- 로그인/회원가입 모달 -->
    <div id="auth-overlay" class="auth-overlay" style="display: none;">
        <div class="auth-box">
            <button class="close-auth" onclick="closeModal('auth-overlay')">&times;</button>
            <h2 id="auth-title">로그인</h2>
            <form id="auth-form">
                <input type="text" id="username" placeholder="아이디" required>
                <input type="password" id="password" placeholder="비밀번호" required>
                <div id="signup-fields" style="display: none;">
                    <input type="text" id="security-answer" placeholder="보물 1호는?">
                </div>
                <button type="submit" class="primary-btn">로그인</button>
            </form>
            <div class="auth-footer">
                <button id="auth-switch-btn" class="text-link">회원가입 하기</button>
            </div>
        </div>
    </div>

    <!-- 입력 전용 모달 (추가 버튼 누르면 나타남) -->
    <div id="add-item-overlay" class="auth-overlay" style="display: none;">
        <div class="auth-box add-item-box">
            <button class="close-auth" onclick="closeModal('add-item-overlay')">&times;</button>
            <h2 id="add-item-title">3월 1일 기록하기</h2>
            
            <div class="tabs">
                <button id="tab-s" class="active" onclick="switchAddTab('s')">일정</button>
                <button id="tab-e" onclick="switchAddTab('e')">가계부</button>
            </div>

            <!-- 일정 입력 폼 -->
            <div id="form-s" class="add-form">
                <input type="text" id="s-input" placeholder="할 일을 입력하세요">
                <button onclick="handleAddSchedule()" class="primary-btn">일정 추가</button>
            </div>

            <!-- 가계부 입력 폼 -->
            <div id="form-e" class="add-form" style="display: none;">
                <div class="type-toggle">
                    <button id="type-out" class="active" onclick="switchExpType('out')">지출 (-)</button>
                    <button id="type-in" onclick="switchExpType('in')">입금 (+)</button>
                </div>
                <input type="text" id="e-desc-input" placeholder="내용 (예: 월급, 점심식사)">
                <input type="number" id="e-amt-input" placeholder="금액 (원)">
                <button onclick="handleAddExpense()" class="primary-btn">가계부 추가</button>
            </div>
        </div>
    </div>

    <div class="mobile-container">
        <!-- 상단 헤더 -->
        <header class="mobile-header">
            <div class="header-left">
                <div id="user-welcome" class="user-welcome">방문자님</div>
                <div id="trial-badge" class="trial-badge">체험판</div>
            </div>
            <div class="header-right">
                <button id="login-nav-btn" class="login-nav-btn" onclick="openModal('auth-overlay')">로그인</button>
                <button id="logout-btn" class="icon-btn" style="display: none;"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </header>

        <!-- 메인 달력 영역 -->
        <main class="content-area">
            <div class="calendar-nav">
                <button id="prev-month"><i class="fas fa-chevron-left"></i></button>
                <h2 id="current-month-year">2024년 3월</h2>
                <button id="next-month"><i class="fas fa-chevron-right"></i></button>
            </div>
            
            <div id="calendar" class="calendar">
                <!-- 달력 날짜와 인라인 상세창이 이곳에 생성됨 -->
            </div>

            <div class="bottom-area">
                <div class="monthly-summary-bar">
                    이번 달 총 지출: <span id="total-monthly-expense">0</span>원
                </div>
                <button id="floating-add-btn" class="floating-add-btn" style="display: none;" onclick="openAddModal()">
                    <i class="fas fa-plus"></i> 기록 추가
                </button>
            </div>
        </main>
    </div>

    <!-- 인라인 상세 내역 템플릿 (제목 제거 버전) -->
    <template id="detail-template">
        <div class="inline-detail">
            <div class="detail-content">
                <div class="detail-list-section">
                    <ul class="s-list item-list"></ul>
                </div>
                <div class="detail-list-section">
                    <ul class="e-list item-list"></ul>
                    <div class="day-total">일일 합계: <span class="d-total-amt">0</span>원</div>
                </div>
            </div>
        </div>
    </template>

    <script src="main.js"></script>
</body>
</html>
