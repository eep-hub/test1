<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프리미엄 로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <button id="dark-mode-toggle" class="theme-btn">
        <i class="fas fa-moon"></i>
    </button>

    <div class="container">
        <header>
            <h1><i class="fas fa-ticket-alt"></i> LOTTO 6/45</h1>
            <p class="subtitle">당신의 행운을 확인해보세요</p>
        </header>

        <div class="action-area">
            <button id="generate-btn">번호 생성하기</button>
        </div>

        <div id="lotto-numbers" class="lotto-numbers-container">
            <!-- 번호가 여기에 생성됩니다 -->
        </div>

        <hr class="divider">

        <section class="contact-section">
            <h3><i class="fas fa-envelope"></i> 제휴 및 비즈니스 문의</h3>
            <form action="https://formspree.io/f/xjgezlap" method="POST" class="contact-form">
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일 주소를 입력하세요" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
